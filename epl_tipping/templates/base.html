<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "EPL Tipping" }}</title>
  <link rel="icon" href="{{ app_path('/favicon.ico') }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ app_path('/static/styles.css') }}?v=20260717-1">
  <script src="{{ app_path('/static/app.js') }}?v=20260717-1" defer></script>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ app_path('/') }}"><span class="brand-mark">PL</span><span>Tipping Competition</span></a>
    <nav aria-label="Primary navigation">
      <a {% if is_active_path(request, '/') %}class="active"{% endif %} href="{{ app_path('/') }}">Schedule</a>
      <a {% if is_active_path(request, '/today') %}class="active"{% endif %} href="{{ app_path('/today') }}">Today</a>
      <a {% if is_active_path(request, '/leaderboard') %}class="active"{% endif %} href="{{ app_path('/leaderboard') }}">Leaderboard</a>
      <a {% if is_active_path(request, '/admin') %}class="active"{% endif %} href="{{ app_path('/admin') }}">Admin</a>
    </nav>
  </header>
  <main>
    {% if message %}<div class="notice">{{ message }}</div>{% endif %}
    {% block content %}{% endblock %}
  </main>
  <footer>English Premier League · Times shown in <span data-browser-timezone>your timezone</span> · Competition rules: {{ competition_timezone }}</footer>
</body>
</html>
