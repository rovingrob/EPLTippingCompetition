<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "EPL Tipping" }}</title>
  <link rel="icon" href="{{ app_path('/favicon.ico') }}" type="image/svg+xml">
  <script src="{{ app_path('/static/theme-init.js') }}?v=20260720-1"></script>
  <link rel="stylesheet" href="{{ app_path('/static/styles.css') }}?v=20260720-9">
  <script src="{{ app_path('/static/app.js') }}?v=20260720-2" defer></script>
</head>
<body class="{% block body_class %}{% endblock %}">
  <header class="site-header">
    <a class="brand" href="{{ app_path('/') }}" aria-label="Premier League Tipping home"><span class="brand-mark">PL</span><span>Premier League Tipping</span></a>
    <div class="site-header-actions">
      <nav aria-label="Primary navigation">
        <a {% if is_active_path(request, '/') %}class="active"{% endif %} href="{{ app_path('/') }}">Schedule</a>
        <a {% if is_active_path(request, '/today') %}class="active"{% endif %} href="{{ app_path('/today') }}">Today</a>
        <a {% if is_active_path(request, '/leaderboard') or request.url.path.startswith(app_path('/leaderboard/')) %}class="active"{% endif %} href="{{ app_path('/leaderboard') }}">Leaderboard</a>
        <a {% if is_active_path(request, '/admin') %}class="active"{% endif %} href="{{ app_path('/admin') }}">Admin</a>
      </nav>
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch to light theme" aria-pressed="false" title="Switch to light theme">
        <span class="theme-toggle-icon theme-toggle-sun" aria-hidden="true">☀</span>
        <span class="theme-toggle-icon theme-toggle-moon" aria-hidden="true">☾</span>
      </button>
    </div>
  </header>
  <main>
    {% if message %}<div class="notice">{{ message }}</div>{% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
