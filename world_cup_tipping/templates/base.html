<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "World Cup Tipping" }}</title>
    <link rel="icon" href="{{ app_path('/static/favicon.svg') }}" type="image/svg+xml">
    <link rel="stylesheet" href="{{ app_path('/static/styles.css') }}?v=20260611-1">
    <script defer src="{{ app_path('/static/app.js') }}?v=20260611-1"></script>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="{{ app_path('/') }}">World Cup Tipping</a>
      <nav>
        <a href="{{ app_path('/') }}" {% if is_active_path(request, '/') %}aria-current="page"{% endif %}>Schedule</a>
        <a href="{{ app_path('/leaderboard') }}" {% if is_active_path(request, '/leaderboard') %}aria-current="page"{% endif %}>Leaderboard</a>
      </nav>
      <button class="theme-toggle secondary" type="button" data-theme-toggle>Dark mode</button>
    </header>
    <main class="shell">
      {% if message %}
        <div class="notice">{{ message }}</div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
